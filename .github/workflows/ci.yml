name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  # Eval quality gates (override in repo settings if needed)
  EVAL_MIN_HIT_AT_K: "0.70"
  EVAL_MIN_MRR: "0.65"
  EVAL_MIN_PRECISION_AT_K: "0.35"
  EVAL_MAX_ABSTENTION_RATE: "0.35"
  EVAL_MIN_PCT_GROUNDED: "0.60"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.9.10

      - name: Run ruff
        run: ruff check .

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  eval-gate:
    name: Eval quality gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-models-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ingest curated corpus
        run: python ingestion/embed_and_store.py
        env:
          PYTHONPATH: .

      - name: Run evaluations (no LLM, no rerank)
        run: python evals/run_evals.py --no-llm --no-rerank
        env:
          PYTHONPATH: .

      - name: Check eval quality gates
        run: python scripts/check_eval_gate.py evals/results.json
        env:
          PYTHONPATH: .
          EVAL_MIN_HIT_AT_K: ${{ env.EVAL_MIN_HIT_AT_K }}
          EVAL_MIN_MRR: ${{ env.EVAL_MIN_MRR }}
          EVAL_MIN_PRECISION_AT_K: ${{ env.EVAL_MIN_PRECISION_AT_K }}
          EVAL_MAX_ABSTENTION_RATE: ${{ env.EVAL_MAX_ABSTENTION_RATE }}
          EVAL_MIN_PCT_GROUNDED: ${{ env.EVAL_MIN_PCT_GROUNDED }}

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results.json
